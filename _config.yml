# Site Settings
title: Ahmed Nadar
description: "Toronto-based product builder. I ship Rails + AI apps that solve real problems for real people. SolveTO maps over 1 million civic assets across Toronto, Mississauga, and Milton. STL Agent helps GTA contractors stop losing $50K/year to slow follow-up."
url: "https://ahmednadar.com"
baseurl: ""
permalink: /:title/
markdown: kramdown
future: true   # build posts dated in the future (lets the June 25 talk post publish on push)

# Author
author:
  name: Ahmed Nadar
  role: "Product builder · Toronto"
  tagline: "Rails + AI apps that solve a specific problem for a specific person."
  location: "Toronto, Canada"
  github: AhmedNadar
  twitter: ahmednadar
  linkedin: ahmednadar
  availability: "5 GTA contractors for STL Agent install"

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:title/

# Social / OG
twitter:
  card: summary_large_image
  username: ahmednadar
defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/og-default.png

# Build
sass:
  style: compressed
  sass_dir: _sass

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
